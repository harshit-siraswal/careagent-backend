name: CareAgent Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile application
        run: python -m compileall app

      - name: Run tests
        run: python -m pytest

      - name: Validate migration script dry run
        shell: pwsh
        run: ./scripts/validate_migrations.ps1
